<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 大象牙膏 3D 演示</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+SC:wght@400;500;700&display=swap');

    :root {
      --panel-bg: rgba(8, 10, 16, 0.56);
      --panel-border: rgba(255, 255, 255, 0.16);
      --text-main: #f6f1ff;
      --text-subtle: rgba(246, 241, 255, 0.74);
      --accent: #ff54bf;
      --accent-strong: #ff1f9a;
      --shadow: rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 82, 184, 0.18), transparent 24%),
        radial-gradient(circle at 82% 18%, rgba(130, 196, 255, 0.12), transparent 22%),
        linear-gradient(180deg, #0f1118 0%, #0a0c12 46%, #05070d 100%);
      color: var(--text-main);
      font-family: "Noto Serif SC", serif;
    }

    body {
      position: relative;
    }

    canvas {
      display: block;
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px 24px 28px;
    }

    .badge {
      align-self: flex-start;
      max-width: min(440px, calc(100vw - 48px));
      padding: 14px 16px;
      border: 1px solid var(--panel-border);
      background: var(--panel-bg);
      box-shadow: 0 18px 40px var(--shadow);
      backdrop-filter: blur(14px);
      border-radius: 18px;
    }

    .badge h1 {
      margin: 0;
      font-size: clamp(22px, 2.8vw, 34px);
      line-height: 1.1;
      font-family: "Cinzel", serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .badge p {
      margin: 10px 0 0;
      line-height: 1.65;
      font-size: 14px;
      color: var(--text-subtle);
    }

    footer {
      pointer-events: auto;
      position: relative;
      z-index: 3;
      align-self: center;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(10, 12, 20, 0.64);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.36);
      backdrop-filter: blur(14px);
    }

    .status {
      font-size: 13px;
      color: var(--text-subtle);
      letter-spacing: 0.06em;
    }

    button {
      pointer-events: auto;
      position: relative;
      z-index: 4;
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      min-width: 160px;
      color: white;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      font-family: "Noto Serif SC", serif;
      background:
        radial-gradient(circle at 25% 20%, rgba(255, 255, 255, 0.26), transparent 30%),
        linear-gradient(135deg, var(--accent) 0%, #ff3ba6 55%, var(--accent-strong) 100%);
      box-shadow:
        0 10px 24px rgba(255, 31, 154, 0.35),
        inset 0 1px 1px rgba(255, 255, 255, 0.35);
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow:
        0 16px 32px rgba(255, 31, 154, 0.46),
        inset 0 1px 1px rgba(255, 255, 255, 0.4);
      filter: saturate(1.08);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      cursor: default;
      opacity: 0.65;
      filter: grayscale(0.2);
    }

    .credit {
      position: fixed;
      z-index: 2;
      right: 24px;
      bottom: 108px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.44);
      letter-spacing: 0.04em;
      pointer-events: none;
      text-align: right;
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      #overlay {
        padding: 14px 14px 18px;
      }

      .badge {
        max-width: calc(100vw - 28px);
        padding: 12px 14px;
      }

      footer {
        flex-direction: column;
        border-radius: 22px;
        width: min(100%, 330px);
      }

      button {
        width: 100%;
      }

      .credit {
        right: 14px;
        bottom: 122px;
      }
    }
  </style>
</head>
<body>
  <div id="overlay">
    <section class="badge">
      <h1>Elephant Toothpaste</h1>
      <p>
        透明玻璃三角烧瓶中预置荧光粉色液体。点击底部按钮后，泡沫会以高压柱状持续喷发，随后逐渐衰减、坠落、压扁并在烧瓶外壁与地面形成堆积覆盖层。
      </p>
    </section>
    <footer>
      <button id="startButton" type="button">开始喷发</button>
      <span class="status" id="statusText">等待触发反应</span>
    </footer>
  </div>
  <div class="credit">单文件 HTML / CSS / JavaScript · Three.js</div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.161.0/examples/jsm/controls/OrbitControls.js';
    import { RoomEnvironment } from 'https://unpkg.com/three@0.161.0/examples/jsm/environments/RoomEnvironment.js';

    const FLASK_HEIGHT = 10.8;
    const REACTION_DURATION = 11.5;
    const INITIAL_FILL_Y = 3.55;
    const MIN_FILL_Y = 0.92;
    const PARTICLE_COUNT = 1200;
    const GRID_SIZE = 82;
    const GRID_CELL = 0.55;
    const GRID_HALF = (GRID_SIZE * GRID_CELL) * 0.5;
    const NOZZLE_Y = FLASK_HEIGHT + 0.04;
    const WORLD_UP = new THREE.Vector3(0, 1, 0);
    const ZERO = new THREE.Vector3(0, 0, 0);

    const outerContour = [
      { y: 0.00, r: 2.55 },
      { y: 0.28, r: 2.55 },
      { y: 0.78, r: 2.72 },
      { y: 1.80, r: 2.60 },
      { y: 3.75, r: 2.23 },
      { y: 5.70, r: 1.84 },
      { y: 6.85, r: 1.48 },
      { y: 7.52, r: 1.08 },
      { y: 7.88, r: 0.95 },
      { y: 10.80, r: 0.95 }
    ];

    const innerContour = [
      { y: 0.32, r: 2.18 },
      { y: 0.50, r: 2.18 },
      { y: 0.92, r: 2.31 },
      { y: 1.92, r: 2.20 },
      { y: 3.80, r: 1.86 },
      { y: 5.55, r: 1.49 },
      { y: 6.65, r: 1.18 },
      { y: 7.28, r: 0.90 },
      { y: 7.62, r: 0.72 },
      { y: 10.56, r: 0.72 }
    ];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0d12);
    scene.fog = new THREE.Fog(0x0a0d12, 90, 190);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    document.body.appendChild(renderer.domElement);

    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    scene.environment = pmremGenerator.fromScene(new RoomEnvironment(renderer), 0.05).texture;
    pmremGenerator.dispose();

    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(28, 25, 28);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 5.8, 0);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.minDistance = 18;
    controls.maxDistance = 70;
    controls.minPolarAngle = Math.PI * 0.18;
    controls.maxPolarAngle = Math.PI * 0.48;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xfff2fb, 1.5);
    scene.add(ambientLight);

    const hemiLight = new THREE.HemisphereLight(0xd9ecff, 0x4b4852, 0.85);
    hemiLight.position.set(0, 30, 0);
    scene.add(hemiLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 3.2);
    keyLight.position.set(22, 34, 18);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(2048, 2048);
    keyLight.shadow.camera.near = 1;
    keyLight.shadow.camera.far = 100;
    keyLight.shadow.camera.left = -24;
    keyLight.shadow.camera.right = 24;
    keyLight.shadow.camera.top = 24;
    keyLight.shadow.camera.bottom = -24;
    keyLight.shadow.bias = -0.00012;
    scene.add(keyLight);

    const rimLight = new THREE.DirectionalLight(0xff8ec8, 0.8);
    rimLight.position.set(-16, 12, -18);
    scene.add(rimLight);

    const plane = new THREE.Mesh(
      new THREE.PlaneGeometry(1000, 1000),
      new THREE.MeshStandardMaterial({
        color: 0x8d9097,
        roughness: 0.18,
        metalness: 0.03
      })
    );
    plane.rotation.x = -Math.PI * 0.5;
    plane.receiveShadow = true;
    scene.add(plane);

    const reflectionCards = new THREE.Group();
    const cardMaterial = new THREE.MeshBasicMaterial({ color: 0x2e3947, transparent: true, opacity: 0.34 });
    const cardMaterialPink = new THREE.MeshBasicMaterial({ color: 0x6d284a, transparent: true, opacity: 0.22 });

    const backCard = new THREE.Mesh(new THREE.PlaneGeometry(120, 70), cardMaterial);
    backCard.position.set(0, 24, -56);
    scene.add(backCard);

    const sideCardLeft = new THREE.Mesh(new THREE.PlaneGeometry(80, 54), cardMaterialPink);
    sideCardLeft.position.set(-52, 18, -6);
    sideCardLeft.rotation.y = Math.PI * 0.28;
    reflectionCards.add(sideCardLeft);

    const sideCardRight = new THREE.Mesh(new THREE.PlaneGeometry(80, 54), cardMaterial);
    sideCardRight.position.set(52, 18, -2);
    sideCardRight.rotation.y = -Math.PI * 0.28;
    reflectionCards.add(sideCardRight);

    scene.add(reflectionCards);

    const flaskGroup = new THREE.Group();
    flaskGroup.position.set(0, 0, 0);
    scene.add(flaskGroup);

    const glassMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.9,
      roughness: 0.95,
      metalness: 0.35,
      clearcoat: 1.0,
      clearcoatRoughness: 0.03,
      transmission: 0.95,
      ior: 1.5,
      thickness: 1.0,
      reflectivity: 0.85,
      envMapIntensity: 1.15,
      side: THREE.DoubleSide
    });

    function contourRadius(y, contour) {
      if (y <= contour[0].y) return contour[0].r;
      for (let i = 0; i < contour.length - 1; i += 1) {
        const a = contour[i];
        const b = contour[i + 1];
        if (y <= b.y) {
          const t = (y - a.y) / (b.y - a.y || 1);
          const smooth = t * t * (3 - 2 * t);
          return THREE.MathUtils.lerp(a.r, b.r, smooth);
        }
      }
      return contour[contour.length - 1].r;
    }

    function contourToProfile(contour, baseY) {
      return [new THREE.Vector2(0, baseY), ...contour.map((point) => new THREE.Vector2(point.r, point.y))];
    }

    const outerShell = new THREE.Mesh(
      new THREE.LatheGeometry(contourToProfile(outerContour, 0), 160),
      glassMaterial.clone()
    );
    outerShell.castShadow = true;
    outerShell.receiveShadow = true;
    flaskGroup.add(outerShell);

    const innerShell = new THREE.Mesh(
      new THREE.LatheGeometry(contourToProfile(innerContour, innerContour[0].y), 160),
      glassMaterial.clone()
    );
    innerShell.material.side = THREE.BackSide;
    innerShell.material.opacity = 0.82;
    innerShell.material.transmission = 0.94;
    innerShell.castShadow = true;
    innerShell.receiveShadow = true;
    flaskGroup.add(innerShell);

    const rimRing = new THREE.Mesh(
      new THREE.RingGeometry(
        innerContour[innerContour.length - 1].r,
        outerContour[outerContour.length - 1].r,
        100
      ),
      glassMaterial.clone()
    );
    rimRing.rotation.x = -Math.PI * 0.5;
    rimRing.position.y = FLASK_HEIGHT;
    flaskGroup.add(rimRing);

    const flaskEdges = new THREE.LineSegments(
      new THREE.EdgesGeometry(outerShell.geometry, 22),
      new THREE.LineBasicMaterial({ color: 0xe6f4ff, transparent: true, opacity: 0.32 })
    );
    flaskGroup.add(flaskEdges);

    const liquidMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xff62c3,
      emissive: 0xff2ea3,
      emissiveIntensity: 0.35,
      transparent: true,
      opacity: 0.92,
      transmission: 0.18,
      roughness: 0.2,
      metalness: 0.04,
      clearcoat: 0.7,
      clearcoatRoughness: 0.1,
      thickness: 0.55,
      ior: 1.33,
      side: THREE.DoubleSide
    });

    const liquidMesh = new THREE.Mesh(new THREE.BufferGeometry(), liquidMaterial);
    liquidMesh.castShadow = true;
    liquidMesh.receiveShadow = true;
    flaskGroup.add(liquidMesh);

    const liquidGlow = new THREE.PointLight(0xff57ba, 1.4, 14, 2.2);
    liquidGlow.position.set(0, 2.4, 0);
    flaskGroup.add(liquidGlow);

    function buildLiquidGeometry(fillY) {
      const inset = 0.085;
      const minY = innerContour[0].y + 0.02;
      const clampedFill = THREE.MathUtils.clamp(fillY, minY + 0.08, innerContour[innerContour.length - 1].y - 0.2);
      const points = [new THREE.Vector2(0, minY)];

      for (const point of innerContour) {
        if (point.y < clampedFill) {
          points.push(new THREE.Vector2(Math.max(0.08, point.r - inset), point.y));
        }
      }

      const topRadius = Math.max(0.08, contourRadius(clampedFill, innerContour) - inset);
      points.push(new THREE.Vector2(topRadius, clampedFill));
      points.push(new THREE.Vector2(0, clampedFill));
      return new THREE.LatheGeometry(points, 128);
    }

    let currentLiquidFill = INITIAL_FILL_Y;

    function updateLiquid(fillY) {
      if (Math.abs(fillY - currentLiquidFill) < 0.01 && liquidMesh.geometry.attributes.position) {
        liquidGlow.position.y = fillY - 0.9;
        return;
      }
      currentLiquidFill = fillY;
      if (liquidMesh.geometry) liquidMesh.geometry.dispose();
      liquidMesh.geometry = buildLiquidGeometry(fillY);
      liquidGlow.position.y = fillY - 0.95;
    }

    updateLiquid(INITIAL_FILL_Y);

    function createFoamTexture(size = 128) {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');
      const image = ctx.createImageData(size, size);

      for (let y = 0; y < size; y += 1) {
        for (let x = 0; x < size; x += 1) {
          const index = (y * size + x) * 4;
          const nx = x / (size - 1) * 2 - 1;
          const ny = y / (size - 1) * 2 - 1;
          const dist = Math.sqrt(nx * nx + ny * ny);
          const radial = Math.max(0, 1 - dist);
          const noise = 0.4
            + 0.3 * Math.sin(x * 0.22)
            + 0.18 * Math.cos(y * 0.17)
            + 0.22 * Math.sin((x + y) * 0.11)
            + Math.random() * 0.2;
          const alpha = THREE.MathUtils.clamp((radial * 0.78 + noise * 0.22), 0, 1);
          image.data[index] = 255;
          image.data[index + 1] = 255;
          image.data[index + 2] = 255;
          image.data[index + 3] = Math.floor(alpha * 255);
        }
      }

      ctx.putImageData(image, 0, 0);
      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(2.2, 2.2);
      texture.needsUpdate = true;
      return texture;
    }

    const foamTexture = createFoamTexture();

    const foamMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xff75d1,
      emissive: 0xff2d9c,
      emissiveIntensity: 0.28,
      transparent: true,
      opacity: 0.8,
      transmission: 0.06,
      thickness: 0.16,
      roughness: 0.78,
      metalness: 0.0,
      clearcoat: 0.15,
      alphaMap: foamTexture,
      roughnessMap: foamTexture,
      bumpMap: foamTexture,
      bumpScale: 0.06,
      side: THREE.DoubleSide,
      depthWrite: false
    });

    const bubbleGeometry = new THREE.IcosahedronGeometry(1, 3);
    {
      const positions = bubbleGeometry.attributes.position;
      for (let i = 0; i < positions.count; i += 1) {
        const x = positions.getX(i);
        const y = positions.getY(i);
        const z = positions.getZ(i);
        const wobble = Math.sin(x * 4.8 + y * 6.9 + z * 5.7) * 0.095
          + Math.cos(x * 8.2 - z * 7.7 + y * 3.1) * 0.045;
        const radial = 1 + wobble;
        positions.setXYZ(i, x * radial, y * (1 + wobble * 0.55), z * radial);
      }
      positions.needsUpdate = true;
      bubbleGeometry.computeVertexNormals();
    }

    const foamColumnGeometry = new THREE.CylinderGeometry(0.9, 0.82, 1, 36, 42, false);
    const foamColumnBase = Float32Array.from(foamColumnGeometry.attributes.position.array);
    const foamColumn = new THREE.Mesh(foamColumnGeometry, foamMaterial.clone());
    foamColumn.material.opacity = 0.62;
    foamColumn.material.emissiveIntensity = 0.32;
    foamColumn.castShadow = true;
    foamColumn.receiveShadow = true;
    foamColumn.visible = false;
    scene.add(foamColumn);

    const plumeCap = new THREE.Mesh(
      new THREE.SphereGeometry(1.15, 32, 32),
      foamMaterial.clone()
    );
    plumeCap.material.opacity = 0.54;
    plumeCap.visible = false;
    plumeCap.castShadow = true;
    plumeCap.receiveShadow = true;
    scene.add(plumeCap);

    function updateFoamColumn(elapsed, pressure) {
      const visible = pressure > 0.04;
      foamColumn.visible = visible;
      plumeCap.visible = visible;

      if (!visible) return;

      const columnHeight = 5 + pressure * 28.5;
      const radiusScale = 1 + pressure * 0.22;
      const positions = foamColumn.geometry.attributes.position;

      for (let i = 0; i < positions.count; i += 1) {
        const baseX = foamColumnBase[i * 3 + 0];
        const baseY = foamColumnBase[i * 3 + 1];
        const baseZ = foamColumnBase[i * 3 + 2];
        const ny = baseY + 0.5;
        const lump = 1
          + 0.14 * Math.sin(ny * 17 + elapsed * 4.3 + baseX * 4.8)
          + 0.08 * Math.cos(ny * 12 - elapsed * 3.5 + baseZ * 6.4)
          + 0.05 * Math.sin((baseX + baseZ) * 7.2 + elapsed * 2.4);
        const taper = THREE.MathUtils.lerp(1.08, 0.72, ny ** 1.35);
        const scale = lump * taper * radiusScale;
        positions.setXYZ(i, baseX * scale, baseY, baseZ * scale);
      }

      positions.needsUpdate = true;
      foamColumn.geometry.computeVertexNormals();

      foamColumn.scale.set(1, columnHeight, 1);
      foamColumn.position.set(0, NOZZLE_Y + columnHeight * 0.5 - 0.12, 0);

      plumeCap.scale.set(1.4 + pressure * 0.95, 0.95 + pressure * 0.3, 1.4 + pressure * 0.95);
      plumeCap.position.set(
        Math.sin(elapsed * 1.1) * 0.12,
        NOZZLE_Y + columnHeight + 0.25,
        Math.cos(elapsed * 0.9) * 0.12
      );
    }

    const particles = [];
    const particleMesh = new THREE.InstancedMesh(bubbleGeometry, foamMaterial, PARTICLE_COUNT);
    particleMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    particleMesh.castShadow = true;
    particleMesh.receiveShadow = true;
    scene.add(particleMesh);

    const matrix = new THREE.Matrix4();
    const quat = new THREE.Quaternion();
    const tmpColor = new THREE.Color();
    const tmpVec = new THREE.Vector3();

    for (let i = 0; i < PARTICLE_COUNT; i += 1) {
      particles.push({
        active: false,
        state: 'free',
        position: new THREE.Vector3(0, -100, 0),
        velocity: new THREE.Vector3(),
        slideVelocity: new THREE.Vector3(),
        normal: new THREE.Vector3(0, 1, 0),
        scale: new THREE.Vector3(0.0001, 0.0001, 0.0001),
        seed: Math.random() * 1000,
        size: 0.2,
        age: 0,
        settleTimer: 0,
        slideSpeed: 0,
        angle: 0,
        surfaceY: 0,
        angularDrift: 0
      });
      particleMesh.setColorAt(i, new THREE.Color(0xff7ad4));
      matrix.compose(particles[i].position, quat.identity(), particles[i].scale);
      particleMesh.setMatrixAt(i, matrix);
    }

    particleMesh.instanceMatrix.needsUpdate = true;
    if (particleMesh.instanceColor) particleMesh.instanceColor.needsUpdate = true;

    const planeHeights = new Float32Array(GRID_SIZE * GRID_SIZE);

    function gridIndex(ix, iz) {
      return iz * GRID_SIZE + ix;
    }

    function samplePlaneHeight(x, z) {
      const gx = THREE.MathUtils.clamp((x + GRID_HALF) / GRID_CELL, 0, GRID_SIZE - 1.001);
      const gz = THREE.MathUtils.clamp((z + GRID_HALF) / GRID_CELL, 0, GRID_SIZE - 1.001);
      const x0 = Math.floor(gx);
      const z0 = Math.floor(gz);
      const x1 = Math.min(GRID_SIZE - 1, x0 + 1);
      const z1 = Math.min(GRID_SIZE - 1, z0 + 1);
      const tx = gx - x0;
      const tz = gz - z0;
      const h00 = planeHeights[gridIndex(x0, z0)];
      const h10 = planeHeights[gridIndex(x1, z0)];
      const h01 = planeHeights[gridIndex(x0, z1)];
      const h11 = planeHeights[gridIndex(x1, z1)];
      const hx0 = THREE.MathUtils.lerp(h00, h10, tx);
      const hx1 = THREE.MathUtils.lerp(h01, h11, tx);
      return THREE.MathUtils.lerp(hx0, hx1, tz);
    }

    function addPlaneDeposit(x, z, amount) {
      const gx = Math.round(THREE.MathUtils.clamp((x + GRID_HALF) / GRID_CELL, 1, GRID_SIZE - 2));
      const gz = Math.round(THREE.MathUtils.clamp((z + GRID_HALF) / GRID_CELL, 1, GRID_SIZE - 2));

      for (let dz = -1; dz <= 1; dz += 1) {
        for (let dx = -1; dx <= 1; dx += 1) {
          const distance = Math.sqrt(dx * dx + dz * dz);
          const weight = distance === 0 ? 1 : distance < 1.5 ? 0.52 : 0.18;
          planeHeights[gridIndex(gx + dx, gz + dz)] += amount * weight;
        }
      }
    }

    function getParticleSlot() {
      let candidate = -1;
      let oldestAge = -1;

      for (let i = 0; i < PARTICLE_COUNT; i += 1) {
        const particle = particles[i];
        if (!particle.active) return i;
        if ((particle.state === 'stuckPlane' || particle.state === 'stuckFlask') && particle.age > oldestAge) {
          oldestAge = particle.age;
          candidate = i;
        }
      }

      return candidate;
    }

    function hideParticle(index) {
      const particle = particles[index];
      particle.active = false;
      particle.position.set(0, -100, 0);
      particle.scale.set(0.0001, 0.0001, 0.0001);
      matrix.compose(particle.position, quat.identity(), particle.scale);
      particleMesh.setMatrixAt(index, matrix);
    }

    function spawnParticle(pressure) {
      const slot = getParticleSlot();
      if (slot === -1) return;

      const particle = particles[slot];
      const baseAngle = Math.random() * Math.PI * 2;
      const radial = Math.sqrt(Math.random()) * (0.16 + pressure * 0.34);
      const upwardSpeed = 8 + pressure * 24 + Math.random() * 3.5;
      const swirl = 0.55 + pressure * 1.35;
      const size = THREE.MathUtils.lerp(0.11, 0.28, Math.random()) * (0.88 + pressure * 0.34);

      particle.active = true;
      particle.state = 'free';
      particle.age = 0;
      particle.settleTimer = 0;
      particle.size = size;
      particle.position.set(Math.cos(baseAngle) * radial, NOZZLE_Y + Math.random() * 0.08, Math.sin(baseAngle) * radial);
      particle.velocity.set(
        Math.cos(baseAngle) * swirl,
        upwardSpeed,
        Math.sin(baseAngle) * swirl
      );
      particle.slideVelocity.set(0, 0, 0);
      particle.normal.set(0, 1, 0);
      particle.slideSpeed = 0;
      particle.angle = baseAngle;
      particle.surfaceY = 0;
      particle.angularDrift = 0;

      tmpColor.setHSL(0.9 + Math.random() * 0.03, 0.92, 0.72 + Math.random() * 0.08);
      particleMesh.setColorAt(slot, tmpColor);
    }

    function startPlaneSlide(particle) {
      particle.state = 'slidePlane';
      particle.normal.set(0, 1, 0);
      particle.slideVelocity.copy(particle.velocity).multiplyScalar(0.2);
      particle.slideVelocity.y = 0;
      particle.velocity.set(0, 0, 0);
      particle.settleTimer = 0.28 + Math.random() * 0.58;
      particle.position.y = samplePlaneHeight(particle.position.x, particle.position.z) + particle.size * 0.12;
    }

    function finalizePlaneParticle(particle) {
      addPlaneDeposit(particle.position.x, particle.position.z, particle.size * 0.15);
      particle.position.y = samplePlaneHeight(particle.position.x, particle.position.z) + particle.size * 0.08;
      particle.state = 'stuckPlane';
      particle.slideVelocity.set(0, 0, 0);
      particle.velocity.set(0, 0, 0);
      particle.normal.set(0, 1, 0);
    }

    function slideFromFlaskToPlane(particle) {
      const footRadius = contourRadius(0.68, outerContour) + 0.22;
      particle.position.set(Math.cos(particle.angle) * footRadius, particle.position.y, Math.sin(particle.angle) * footRadius);
      particle.state = 'slidePlane';
      particle.slideVelocity.set(Math.cos(particle.angle), 0, Math.sin(particle.angle)).multiplyScalar(0.4 + Math.random() * 0.55);
      particle.settleTimer = 0.22 + Math.random() * 0.32;
      particle.normal.set(0, 1, 0);
      particle.position.y = samplePlaneHeight(particle.position.x, particle.position.z) + particle.size * 0.1;
    }

    function startFlaskSlide(particle) {
      particle.state = 'slideFlask';
      particle.angle = Math.atan2(particle.position.z, particle.position.x);
      particle.surfaceY = THREE.MathUtils.clamp(particle.position.y, 0.8, FLASK_HEIGHT - 0.18);
      particle.slideSpeed = 0.7 + Math.random() * 0.85 + Math.abs(particle.velocity.y) * 0.05;
      particle.angularDrift = (Math.random() - 0.5) * 0.45;
      particle.settleTimer = 0.35 + Math.random() * 0.65;
      particle.velocity.set(0, 0, 0);
      const radius = contourRadius(particle.surfaceY, outerContour) + particle.size * 0.11;
      particle.normal.set(Math.cos(particle.angle), 0, Math.sin(particle.angle));
      particle.position.set(Math.cos(particle.angle) * radius, particle.surfaceY, Math.sin(particle.angle) * radius);
    }

    function finalizeFlaskParticle(particle) {
      particle.state = 'stuckFlask';
      particle.velocity.set(0, 0, 0);
      particle.slideVelocity.set(0, 0, 0);
      particle.normal.set(Math.cos(particle.angle), 0, Math.sin(particle.angle));
      const radius = contourRadius(particle.surfaceY, outerContour) + particle.size * 0.09;
      particle.position.set(Math.cos(particle.angle) * radius, particle.surfaceY, Math.sin(particle.angle) * radius);
    }

    function updateParticle(particle, dt, elapsed, pressure) {
      particle.age += dt;

      if (!particle.active) return;

      if (particle.state === 'free') {
        const radialDist = Math.hypot(particle.position.x, particle.position.z);
        const dirX = radialDist > 0.0001 ? particle.position.x / radialDist : Math.cos(particle.seed);
        const dirZ = radialDist > 0.0001 ? particle.position.z / radialDist : Math.sin(particle.seed);
        const targetRadius = 0.38 + pressure * 0.52;
        const focusHeight = NOZZLE_Y + 6.5 + pressure * 21.5;
        const cohesion = (radialDist - targetRadius);

        if (particle.position.y < focusHeight) {
          particle.velocity.x -= dirX * cohesion * (10 + pressure * 15) * dt;
          particle.velocity.z -= dirZ * cohesion * (10 + pressure * 15) * dt;
          particle.velocity.y += (1.9 + pressure * 3.4) * dt;
        } else {
          particle.velocity.x += dirX * (1.8 + (1 - pressure) * 2.8) * dt;
          particle.velocity.z += dirZ * (1.8 + (1 - pressure) * 2.8) * dt;
        }

        const swirl = 1.0 + pressure * 1.6;
        particle.velocity.x += -dirZ * swirl * dt * (0.7 + 0.3 * Math.sin(particle.seed + elapsed * 4.1));
        particle.velocity.z += dirX * swirl * dt * (0.7 + 0.3 * Math.cos(particle.seed * 1.37 + elapsed * 4.8));

        const turbulenceX = Math.sin(particle.seed * 2.4 + particle.position.y * 1.17 + elapsed * 5.2)
          + Math.cos(particle.seed + particle.position.z * 1.8 - elapsed * 4.4);
        const turbulenceZ = Math.cos(particle.seed * 1.86 + particle.position.y * 1.36 - elapsed * 4.6)
          - Math.sin(particle.seed * 0.92 + particle.position.x * 1.5 + elapsed * 4.1);

        particle.velocity.x += turbulenceX * 0.65 * dt;
        particle.velocity.z += turbulenceZ * 0.65 * dt;
        particle.velocity.y -= 15.2 * dt;
        particle.velocity.multiplyScalar(Math.max(0.0, 1 - dt * 0.08));
        particle.position.addScaledVector(particle.velocity, dt);

        const radialDistNow = Math.hypot(particle.position.x, particle.position.z);

        if (particle.velocity.y <= 0 && particle.position.y > 0.55 && particle.position.y < FLASK_HEIGHT) {
          const shellRadius = contourRadius(particle.position.y, outerContour);
          if (radialDistNow < shellRadius + particle.size * 0.95 && radialDistNow > shellRadius - 0.75) {
            startFlaskSlide(particle);
            return;
          }
        }

        const floorHeight = samplePlaneHeight(particle.position.x, particle.position.z) + particle.size * 0.05;
        if (particle.position.y <= floorHeight) {
          startPlaneSlide(particle);
          return;
        }

        if (particle.position.y < -5 || particle.position.lengthSq() > 3000 || particle.age > 28) {
          particle.active = false;
        }
      } else if (particle.state === 'slidePlane') {
        particle.settleTimer -= dt;
        particle.slideVelocity.multiplyScalar(Math.exp(-7.2 * dt));
        particle.position.addScaledVector(particle.slideVelocity, dt);

        const distanceFromCenter = Math.hypot(particle.position.x, particle.position.z);
        const baseRadius = contourRadius(0.65, outerContour) + 0.12;
        if (distanceFromCenter < baseRadius) {
          const safeScale = baseRadius / Math.max(distanceFromCenter, 0.001);
          particle.position.x *= safeScale;
          particle.position.z *= safeScale;
        }

        particle.position.y = samplePlaneHeight(particle.position.x, particle.position.z) + particle.size * 0.08;

        if (particle.settleTimer <= 0 || particle.slideVelocity.lengthSq() < 0.0015) {
          finalizePlaneParticle(particle);
        }
      } else if (particle.state === 'slideFlask') {
        particle.settleTimer -= dt;
        particle.angle += particle.angularDrift * dt;
        particle.surfaceY -= particle.slideSpeed * dt;
        particle.slideSpeed *= Math.exp(-2.8 * dt);

        if (particle.surfaceY <= 0.58) {
          slideFromFlaskToPlane(particle);
          return;
        }

        const radius = contourRadius(particle.surfaceY, outerContour) + particle.size * 0.11;
        particle.normal.set(Math.cos(particle.angle), 0, Math.sin(particle.angle));
        particle.position.set(Math.cos(particle.angle) * radius, particle.surfaceY, Math.sin(particle.angle) * radius);

        if (particle.settleTimer <= 0 || particle.slideSpeed < 0.1) {
          finalizeFlaskParticle(particle);
        }
      }
    }

    function composeParticleInstance(index) {
      const particle = particles[index];

      if (!particle.active) {
        particle.scale.set(0.0001, 0.0001, 0.0001);
        matrix.compose(particle.position, quat.identity(), particle.scale);
        particleMesh.setMatrixAt(index, matrix);
        return;
      }

      const state = particle.state;
      if (state === 'free') {
        tmpVec.copy(particle.velocity);
        const speed = tmpVec.length();
        if (speed > 0.001) {
          quat.setFromUnitVectors(WORLD_UP, tmpVec.normalize());
        } else {
          quat.identity();
        }
        const stretch = 1 + Math.min(speed * 0.012, 0.34);
        particle.scale.set(particle.size * 0.96, particle.size * stretch, particle.size * 0.96);
      } else if (state === 'slidePlane' || state === 'stuckPlane') {
        quat.identity();
        particle.scale.set(particle.size * 1.38, particle.size * 0.42, particle.size * 1.38);
      } else {
        quat.setFromUnitVectors(WORLD_UP, particle.normal.clone().normalize());
        particle.scale.set(particle.size * 1.26, particle.size * 0.48, particle.size * 1.26);
      }

      matrix.compose(particle.position, quat, particle.scale);
      particleMesh.setMatrixAt(index, matrix);
    }

    let eruptionStarted = false;
    let eruptionTime = 0;
    let globalTime = 0;
    let spawnAccumulator = 0;

    const startButton = document.getElementById('startButton');
    const statusText = document.getElementById('statusText');

    function resetSimulation() {
      eruptionStarted = false;
      eruptionTime = 0;
      globalTime = 0;
      spawnAccumulator = 0;
      planeHeights.fill(0);
      updateLiquid(INITIAL_FILL_Y);
      foamColumn.visible = false;
      plumeCap.visible = false;
      statusText.textContent = '等待触发反应';

      for (let i = 0; i < PARTICLE_COUNT; i += 1) {
        hideParticle(i);
      }

      particleMesh.instanceMatrix.needsUpdate = true;
      if (particleMesh.instanceColor) particleMesh.instanceColor.needsUpdate = true;
    }

    function startSimulation() {
      resetSimulation();
      eruptionStarted = true;
      statusText.textContent = '反应进行中：高压泡沫喷发';
    }

    startButton.addEventListener('click', () => {
      startSimulation();
      startButton.textContent = '重新喷发';
    });

    function updateSimulation(dt) {
      globalTime += dt;
      let pressure = 0;

      if (eruptionStarted) {
        eruptionTime += dt;
        const remaining = THREE.MathUtils.clamp(1 - eruptionTime / REACTION_DURATION, 0, 1);
        pressure = remaining ** 0.8 * (1 + 0.12 * remaining);

        spawnAccumulator += dt * (28 + pressure * 300);
        while (spawnAccumulator >= 1) {
          spawnParticle(pressure);
          spawnAccumulator -= 1;
        }

        const liquidProgress = THREE.MathUtils.clamp(eruptionTime / (REACTION_DURATION * 0.92), 0, 1);
        const liquidFill = THREE.MathUtils.lerp(INITIAL_FILL_Y, MIN_FILL_Y, liquidProgress);
        updateLiquid(liquidFill);

        if (remaining === 0) {
          statusText.textContent = '反应结束：泡沫继续沉积';
        }
      }

      updateFoamColumn(globalTime, pressure);

      for (let i = 0; i < PARTICLE_COUNT; i += 1) {
        updateParticle(particles[i], dt, globalTime, pressure);
        composeParticleInstance(i);
      }

      particleMesh.instanceMatrix.needsUpdate = true;
      if (particleMesh.instanceColor) particleMesh.instanceColor.needsUpdate = true;

      const anyActive = particles.some((particle) => particle.active && particle.state !== 'stuckPlane' && particle.state !== 'stuckFlask');
      if (!anyActive && eruptionStarted && eruptionTime > REACTION_DURATION) {
        statusText.textContent = '最终状态：泡沫已堆积稳定';
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(0.033, clock.getDelta());
      updateSimulation(dt);
      controls.update();
      renderer.render(scene, camera);
    }

    const clock = new THREE.Clock();
    resetSimulation();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
